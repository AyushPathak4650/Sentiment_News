services:
  - name: web
    type: python
    runtime: python311
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn core.wsgi:application --workers 2
    envVars:
      - key: NEWS_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "sentiment-news-ajit.onrender.com"

cron:
  - name: fetch-news
    schedule: "0 */2 * * *"
    serviceName: web
    command: "curl -s -X POST $SERVICE_URL/api/fetch/"